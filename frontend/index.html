<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>QR Shield</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>QR Shield</h1>

        <p>
            Upload a QR Code to verify whether it is Genuine or Tampered.
        </p>

        <input
            type="file"
            id="fileInput"
            accept="image/*">

        <br><br>

        <button
            id="analyzeBtn"
            type="button">
            Analyze QR
        </button>

        <div id="loading"></div>

        <div id="result"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
